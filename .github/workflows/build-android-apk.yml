name: Build Android APK

# Three ways to trigger this:
# 1. Automatically on every push to main (comment out if you don't want that)
# 2. Manually — go to the "Actions" tab on GitHub → this workflow → "Run workflow"
# 3. On every pull request, so you catch a broken build before merging
"on":
  push:
    branches: [main]
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the GitHub UI
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          # No npm cache here on purpose: it requires a committed
          # mobile/package-lock.json to compute a cache key, and this repo
          # may not have one yet (see mobile/README.md's Troubleshooting
          # section — committing a real, tested lockfile is recommended
          # regardless, for reasons beyond just this workflow's build speed).
          # Once you've committed one, add back: cache: 'npm', cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install

      # This is the safety net referenced throughout this project's README —
      # corrects every expo-* package to the exact version the installed
      # Expo SDK expects, using Expo's own live compatibility data, rather
      # than trusting whatever's pinned in package.json.
      - name: Align Expo package versions
        run: npx expo install --fix

      - name: Generate the native Android project
        run: npx expo prebuild --platform android --clean

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build the debug APK
        working-directory: mobile/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      # Makes the finished APK downloadable from the workflow run's summary
      # page — no server, no email, just a zip download link that appears
      # once this step completes. Kept for 30 days by default.
      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: caretaker24-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
